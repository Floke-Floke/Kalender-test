<!DOCTYPE html>
<html lang="nn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grendehus Kalender</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeecea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #9a9892;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #0c447c; --info-border: rgba(14,90,180,0.3);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0ede8; --text2: #a0a09a; --text3: #666660;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      --info-bg: #0c2a45; --info-text: #85b7eb; --info-border: rgba(100,170,240,0.3);
    }
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 500; flex: 1; }
  .tabs { display: flex; gap: 6px; }
  .tab { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 16px; font-size: 13px; cursor: pointer; color: var(--text2); }
  .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; }
  main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
  .view { display: none; }
  .view.active { display: block; }
  .section-head { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  /* Month grid */
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 600px) { .month-grid { grid-template-columns: repeat(2, 1fr); } }
  .month-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px; min-height: 100px; }
  .month-name { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .event-pill { font-size: 11px; border-radius: 10px; padding: 2px 8px; margin-bottom: 3px; display: block; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; text-align: left; width: 100%; }
  .add-m-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 2px 0; margin-top: 2px; }
  .add-m-btn:hover { color: var(--info-text); }
  /* Legend */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  /* List */
  .list-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .list-items { display: flex; flex-direction: column; gap: 8px; }
  .list-item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-date { font-size: 12px; color: var(--text2); min-width: 80px; }
  .list-title { font-size: 14px; font-weight: 500; flex: 1; cursor: pointer; }
  .list-title:hover { color: var(--info-text); }
  .list-person { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .list-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 0 2px; }
  .list-del:hover { color: #a32d2d; }
  .empty { font-size: 13px; color: var(--text3); padding: 1.5rem 0; }
  /* Persons */
  .persons-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .person-chip { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px 4px 6px; font-size: 13px; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
  .chip-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 0 0 0 2px; }
  .chip-del:hover { color: #a32d2d; }
  .add-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-row input { flex: 1; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); }
  /* Buttons */
  .btn { padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text); }
  .btn:hover { background: var(--bg2); }
  .btn.primary { background: var(--info-bg); border-color: var(--info-border); color: var(--info-text); font-weight: 500; }
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.25rem; width: 340px; max-width: 95vw; }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .form-row { margin-bottom: 10px; }
  .form-row label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 3px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 7px 10px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); font-size: 13px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
  .hidden { display: none !important; }
  footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem 1rem 1rem; }
</style>
</head>
<body>

<header>
  <h1>🏠 Grendehus Kalender</h1>
  <div class="tabs">
    <button class="tab active" onclick="setView('wheel')">Årshjul</button>
    <button class="tab" onclick="setView('list')">Liste</button>
    <button class="tab" onclick="setView('persons')">Personar</button>
  </div>
</header>

<main>
  <!-- Årshjul -->
  <div id="view-wheel" class="view active">
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#378add"></span>Bestilling</span>
      <span class="legend-item"><span class="legend-dot" style="background:#639922"></span>Oppgåve</span>
      <span class="legend-item"><span class="legend-dot" style="background:#ba7517"></span>Møte</span>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <!-- Liste -->
  <div id="view-list" class="view">
    <div class="list-toolbar">
      <div class="section-head" style="margin:0">Alle hendingar</div>
      <button class="btn primary" onclick="openModal(null)">+ Ny hending</button>
    </div>
    <div class="list-items" id="listView"></div>
  </div>

  <!-- Personar -->
  <div id="view-persons" class="view">
    <div class="section-head">Styremedlemmer</div>
    <div class="persons-row" id="personsRow"></div>
    <div class="add-row">
      <input id="newPersonInput" placeholder="Skriv namn..." onkeydown="if(event.key==='Enter')addPerson()">
      <button class="btn primary" onclick="addPerson()">Legg til</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:14px">Personar kan fjernast ved å klikke ×. Eksisterande hendingar vert oppdaterte automatisk.</p>
  </div>
</main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-bg" onclick="closeModalBg(event)">
    <div class="modal">
      <h3 id="modalTitle">Ny hending</h3>
      <div class="form-row"><label>Tittel</label><input id="fTitle" placeholder="t.d. Dugnad, Møte, Leige..."></div>
      <div class="form-row"><label>Dato</label><input id="fDate" type="date"></div>
      <div class="form-row"><label>Type</label>
        <select id="fType">
          <option value="booking">Bestilling av lokale</option>
          <option value="task">Oppgåve</option>
          <option value="meeting">Møte</option>
        </select>
      </div>
      <div class="form-row"><label>Ansvarleg person</label>
        <select id="fPerson"><option value="">– ingen –</option></select>
      </div>
      <div class="form-row"><label>Merknad</label><textarea id="fNote" rows="2" placeholder="Valfri merknad..."></textarea></div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Avbryt</button>
        <button class="btn primary" onclick="saveEvent()">Lagre</button>
      </div>
    </div>
  </div>
</div>

<footer>Grendehus Kalender &mdash; data vert lagra lokalt i nettlesaren din</footer>

<script>
const MONTHS = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const TYPES = {
  booking: { label:'Bestilling', bg:'#e6f1fb', text:'#0c447c', dot:'#378add' },
  task:    { label:'Oppgåve',   bg:'#eaf3de', text:'#27500a', dot:'#639922' },
  meeting: { label:'Møte',      bg:'#faeeda', text:'#633806', dot:'#ba7517' },
};
const AV_BG   = ['#eeedfe','#e1f5ee','#fbeaf0','#faeeda','#e6f1fb','#eaf3de','#faece7'];
const AV_TEXT = ['#3c3489','#085041','#72243e','#633806','#0c447c','#27500a','#712b13'];

const STORE_KEY = 'grendehus_v1';

function load() {
  try { const d = JSON.parse(localStorage.getItem(STORE_KEY)); if(d) return d; } catch(e){}
  return {
    persons: ['Anna K.','Bjørn T.','Cecilie M.','David R.','Else N.'],
    events: [
      {id:1,title:'Styremøte',date:`${new Date().getFullYear()}-01-15`,type:'meeting',person:'Anna K.',note:''},
      {id:2,title:'Dugnad',date:`${new Date().getFullYear()}-04-26`,type:'task',person:'Bjørn T.',note:'Vårreinhald'},
      {id:3,title:'Leige – Ola Hansen',date:`${new Date().getFullYear()}-06-07`,type:'booking',person:'Cecilie M.',note:'Bryllaup'},
    ],
    nextId: 4
  };
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify({persons,events,nextId})); }

let {persons, events, nextId} = load();
let currentView = 'wheel';
let editingId = null;

function initials(n){ return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avStyle(i){ const j=i%AV_BG.length; return `background:${AV_BG[j]};color:${AV_TEXT[j]}`; }

// --- VIEWS ---
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['wheel','list','persons'][i]===v));
  if(v==='wheel') renderWheel();
  if(v==='list') renderList();
  if(v==='persons') renderPersons();
}

// --- WHEEL ---
function renderWheel() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  const year = new Date().getFullYear();
  MONTHS.forEach((m, mi) => {
    const card = document.createElement('div');
    card.className = 'month-card';
    const mo = String(mi+1).padStart(2,'0');
    const evs = events.filter(e=>e.date && e.date.startsWith(year+'-'+mo)).sort((a,b)=>a.date.localeCompare(b.date));
    let html = `<div class="month-name">${m}</div>`;
    evs.forEach(e => {
      const t = TYPES[e.type]||TYPES.task;
      html += `<button class="event-pill" style="background:${t.bg};color:${t.text}" onclick="openModal(${e.id})" title="${e.title}${e.person?' – '+e.person:''}">${e.title}</button>`;
    });
    html += `<button class="add-m-btn" onclick="openModal(null,${mi})">+ legg til</button>`;
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

// --- LIST ---
function renderList() {
  const lv = document.getElementById('listView');
  const sorted = [...events].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length){ lv.innerHTML='<div class="empty">Ingen hendingar enno. Klikk "+ Ny hending" for å starte.</div>'; return; }
  lv.innerHTML = '';
  sorted.forEach(e => {
    const t = TYPES[e.type]||TYPES.task;
    const [y,mo,d] = e.date.split('-');
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div class="list-dot" style="background:${t.dot};border:1.5px solid ${t.text}"></div>
      <div class="list-date">${d}.${mo}.${y}</div>
      <div class="list-title" onclick="openModal(${e.id})">${e.title}</div>
      <div class="list-person">${e.person||''}</div>
      <button class="list-del" onclick="deleteEvent(${e.id})" title="Slett">×</button>`;
    lv.appendChild(div);
  });
}

// --- PERSONS ---
function renderPersons() {
  const row = document.getElementById('personsRow');
  row.innerHTML = '';
  persons.forEach((p,i) => {
    const chip = document.createElement('div');
    chip.className = 'person-chip';
    chip.innerHTML = `<div class="avatar" style="${avStyle(i)}">${initials(p)}</div><span>${p}</span><button class="chip-del" onclick="removePerson(${i})" title="Fjern">×</button>`;
    row.appendChild(chip);
  });
}
function addPerson() {
  const inp = document.getElementById('newPersonInput');
  const name = inp.value.trim();
  if(!name) return;
  persons.push(name);
  inp.value = '';
  save(); renderPersons();
}
function removePerson(i) {
  if(!confirm(`Fjern ${persons[i]}?`)) return;
  const name = persons[i];
  persons.splice(i,1);
  events.forEach(e=>{ if(e.person===name) e.person=''; });
  save(); renderPersons();
}

// --- MODAL ---
function openModal(id, monthIdx) {
  editingId = id;
  const ev = id ? events.find(e=>e.id===id) : null;
  document.getElementById('modalTitle').textContent = ev ? 'Rediger hending' : 'Ny hending';
  document.getElementById('fTitle').value = ev?.title||'';
  const year = new Date().getFullYear();
  if(ev) {
    document.getElementById('fDate').value = ev.date;
  } else if(monthIdx!=null) {
    document.getElementById('fDate').value = `${year}-${String(monthIdx+1).padStart(2,'0')}-01`;
  } else {
    document.getElementById('fDate').value = '';
  }
  document.getElementById('fType').value = ev?.type||'booking';
  document.getElementById('fNote').value = ev?.note||'';
  const sel = document.getElementById('fPerson');
  sel.innerHTML = '<option value="">– ingen –</option>';
  persons.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    if(p===ev?.person) o.selected = true;
    sel.appendChild(o);
  });
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('fTitle').focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function closeModalBg(e) { if(e.target.classList.contains('modal-bg')) closeModal(); }

function saveEvent() {
  const title = document.getElementById('fTitle').value.trim();
  const date  = document.getElementById('fDate').value;
  if(!title || !date) { alert('Fyll inn tittel og dato.'); return; }
  const ev = { id: editingId||nextId++, title, date,
    type: document.getElementById('fType').value,
    person: document.getElementById('fPerson').value,
    note: document.getElementById('fNote').value };
  if(editingId) {
    const idx = events.findIndex(e=>e.id===editingId);
    events[idx] = ev;
  } else {
    events.push(ev);
  }
  save(); closeModal();
  if(currentView==='wheel') renderWheel();
  if(currentView==='list') renderList();
}

function deleteEvent(id) {
  if(!confirm('Slett denne hendinga?')) return;
  events = events.filter(e=>e.id!==id);
  save();
  if(currentView==='list') renderList();
  if(currentView==='wheel') renderWheel();
}

// Init
renderWheel();
</script>
</body>
</html>
